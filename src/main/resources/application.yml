spring:
  application:
    name: hhplus
  profiles:
    active: local
  datasource:
    name: HangHaePlusDataSource
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 3
      connection-timeout: 10000
      max-lifetime: 60000
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/hhplus?characterEncoding=UTF-8&serverTimezone=UTC
    username: application
    password: application

  jpa:
    open-in-view: false
    generate-ddl: false
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate.timezone.default_storage: NORMALIZE_UTC
      hibernate.jdbc.time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379

  # Kafka 설정 직접 포함
  kafka:
    bootstrap-servers:
      - localhost:9092
      - localhost:9093
      - localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      properties:
        linger.ms: 10
        compression.type: snappy
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: concert-reservation-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      max-poll-records: 100
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: reservation-confirmed:kr.hhplus.be.server.infrastructure.kafka.ReservationConfirmedKafkaEvent
        max.poll.interval.ms: 300000
    listener:
      ack-mode: manual
      concurrency: 3
      type: batch

# === 커스텀 설정 ===
reservation:
  hold-ttl-seconds: 120

# Kafka 토픽 설정
kafka:
  topics:
    reservation-confirmed: reservation-confirmed-topic
  topic-config:
    reservation-confirmed:
      partitions: 3
      replication-factor: 2
      retention-ms: 604800000
